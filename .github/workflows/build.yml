name: Build Site

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "_build/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install markdown PyYAML

      - name: Build site
        run: python _build/build.py

      - name: Commit rebuilt HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: rebuild site from content [skip ci]"
          git push
